<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>seameet — demo</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #0f0f0f;
        color: #e0e0e0;
        padding: 1.5rem;
        max-width: 900px;
        margin: 0 auto;
      }
      h1 {
        font-size: 1.4rem;
        margin-bottom: 0.5rem;
      }
      h1 span {
        font-weight: 400;
        color: #888;
        font-size: 0.9rem;
      }

      .badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 12px;
        font-size: 0.8rem;
        font-weight: 600;
        margin-left: 0.5rem;
      }
      .badge.connecting {
        background: #555;
        color: #ccc;
      }
      .badge.signaling {
        background: #b56e00;
        color: #fff;
      }
      .badge.connected {
        background: #1a7a1a;
        color: #fff;
      }
      .badge.disconnected {
        background: #a00;
        color: #fff;
      }

      .info {
        font-size: 0.85rem;
        color: #aaa;
        margin-bottom: 1rem;
      }

      .controls {
        margin-bottom: 1rem;
      }
      button {
        background: #2a2a2a;
        color: #e0e0e0;
        border: 1px solid #444;
        padding: 6px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.85rem;
      }
      button:hover {
        background: #3a3a3a;
      }
      button:active {
        background: #444;
      }

      .videos {
        display: flex;
        gap: 1rem;
        margin-bottom: 1rem;
        flex-wrap: wrap;
      }
      .video-box {
        flex: 1;
        min-width: 280px;
        background: #1a1a1a;
        border-radius: 8px;
        overflow: hidden;
        position: relative;
      }
      .video-box video {
        width: 100%;
        display: block;
        background: #000;
      }
      .video-label {
        position: absolute;
        bottom: 6px;
        left: 8px;
        font-size: 0.75rem;
        background: rgba(0, 0, 0, 0.6);
        padding: 2px 8px;
        border-radius: 4px;
      }
      .video-overlay {
        position: absolute;
        inset: 0;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 0.75rem;
        z-index: 2;
        transition: opacity 0.3s;
      }
      .video-overlay.hidden {
        display: none;
      }
      .video-overlay svg {
        opacity: 0.35;
      }
      .video-overlay span {
        font-size: 0.8rem;
        color: #666;
        letter-spacing: 0.02em;
      }

      #log {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 8px;
        padding: 0.75rem;
        font-family: "SF Mono", "Fira Code", monospace;
        font-size: 0.78rem;
        line-height: 1.5;
        height: 260px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-all;
        color: #aaa;
      }
    </style>
  </head>
  <body>
    <h1>
      seameet <span>— demo</span>
      <span id="badge" class="badge connecting">connecting</span>
    </h1>
    <div class="info">Participant: <code id="pid">—</code></div>

    <div class="controls">
      <button id="muteBtn" onclick="toggleMute()">Mute</button>
      <button id="screenBtn" onclick="toggleScreenShare()">Share Screen</button>
    </div>

    <div class="videos">
      <div class="video-box">
        <video id="local" autoplay playsinline muted></video>
        <div class="video-label">You</div>
      </div>
      <div class="video-box">
        <div id="remoteOverlay" class="video-overlay">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="1" y1="1" x2="23" y2="23"/>
            <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
            <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
            <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
            <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
            <line x1="12" y1="20" x2="12.01" y2="20"/>
          </svg>
          <span>No peer connected</span>
        </div>
        <video id="remote" autoplay playsinline></video>
        <div class="video-label">Remote</div>
      </div>
    </div>

    <div id="screens" class="videos" style="margin-top:0"></div>

    <pre id="log"></pre>

    <script>
      "use strict";

      const WS_URL = `ws://${location.hostname || "localhost"}:3001`;
      const ROOM_ID = "demo-room";

      const participantId = crypto.randomUUID();
      document.getElementById("pid").textContent = participantId;

      let localStream = null;
      let pc = null;
      let ws = null;
      let muted = false;
      let screenStream = null;
      let screenSenders = [];
      let currentScreenTrackId = null;

      // ── Logging ──

      function log(msg) {
        const ts = new Date().toISOString().split("T")[1].slice(0, 12);
        const el = document.getElementById("log");
        el.textContent += `[${ts}] ${msg}\n`;
        el.scrollTop = el.scrollHeight;
      }

      function setBadge(state) {
        const el = document.getElementById("badge");
        el.textContent = state;
        el.className = "badge " + state;
      }

      // ── Mute ──

      function toggleMute() {
        if (!localStream) return;
        muted = !muted;
        localStream.getAudioTracks().forEach((t) => { t.enabled = !muted; });
        document.getElementById("muteBtn").textContent = muted ? "Unmute" : "Mute";
        log(muted ? "microphone muted" : "microphone unmuted");
      }

      // ── WebSocket signaling ──

      function sendWs(obj) {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(obj));
        }
      }

      function connectSignaling() {
        ws = new WebSocket(WS_URL);

        ws.onopen = () => {
          log("WS connected");
          setBadge("signaling");
          sendWs({
            type: "join",
            participant: participantId,
            room_id: ROOM_ID,
          });
          log(`joined as ${participantId.slice(0, 8)}...`);
        };

        ws.onmessage = (evt) => {
          let data;
          try { data = JSON.parse(evt.data); } catch { return; }
          handleSignalingMessage(data);
        };

        ws.onclose = () => {
          log("WS disconnected");
          setBadge("disconnected");
        };

        ws.onerror = () => { log("WS error"); };
      }

      async function handleSignalingMessage(data) {
        // Server says we can create the PeerConnection and send an offer.
        if (data.type === "ready") {
          log("server ready — creating offer");
          await createOfferToServer();
          return;
        }

        // Server's SDP answer.
        if (data.type === "answer") {
          if (!pc) return;
          await pc.setRemoteDescription({ type: "answer", sdp: data.sdp });
          log("server answer applied");
          return;
        }

        // Server sends an ICE candidate (rare — usually in the SDP answer).
        if (data.type === "ice_candidate") {
          if (!pc) return;
          try {
            await pc.addIceCandidate({
              candidate: data.candidate,
              sdpMid: data.sdp_mid || null,
              sdpMLineIndex: data.sdp_mline_index ?? null,
            });
            log("server ICE candidate applied");
          } catch (e) {
            log(`ICE candidate error: ${e.message}`);
          }
          return;
        }
      }

      // ── WebRTC (browser ↔ server) ──

      async function createOfferToServer() {
        // No STUN needed — we connect directly to the server.
        pc = new RTCPeerConnection({ iceServers: [] });

        pc.onicecandidate = (evt) => {
          if (!evt.candidate) return;
          sendWs({
            type: "ice_candidate",
            from: participantId,
            to: participantId,
            room_id: ROOM_ID,
            candidate: evt.candidate.candidate,
            sdp_mid: evt.candidate.sdpMid,
            sdp_mline_index: evt.candidate.sdpMLineIndex,
          });
          log("ICE candidate sent to server");
        };

        pc.ontrack = (evt) => {
          log(`remote track received: ${evt.track.kind}`);
          const remote = document.getElementById("remote");
          // SFU sends tracks via direct_api without stream association,
          // so evt.streams may be empty — create a MediaStream manually.
          if (!remote.srcObject) {
            remote.srcObject = new MediaStream();
          }
          remote.srcObject.addTrack(evt.track);
          showRemoteOverlay(false);
        };

        pc.onconnectionstatechange = () => {
          log(`connection state: ${pc.connectionState}`);
          if (pc.connectionState === "connected") {
            setBadge("connected");
            log("connected to server (SFU)");
          } else if (pc.connectionState === "disconnected" || pc.connectionState === "failed") {
            setBadge("disconnected");
          }
        };

        // Add local tracks if available.
        if (localStream) {
          localStream.getTracks().forEach((track) => {
            pc.addTrack(track, localStream);
          });
        } else {
          // No local media — add transceivers so the offer has m-lines
          // and we can still receive media from the server.
          pc.addTransceiver("audio", { direction: "recvonly" });
          pc.addTransceiver("video", { direction: "recvonly" });
          log("no local media — receiving only");
        }

        // Create and send offer to the server.
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        sendWs({
          type: "offer",
          from: participantId,
          to: null,
          room_id: ROOM_ID,
          sdp: offer.sdp,
        });
        log("offer sent to server");
      }

      // ── Screen share ──

      async function toggleScreenShare() {
        if (screenStream) {
          await stopScreenShare();
        } else {
          await startScreenShare();
        }
      }

      async function startScreenShare() {
        try {
          screenStream = await navigator.mediaDevices.getDisplayMedia({
            video: { frameRate: 15 },
            audio: false,
          });
        } catch (e) {
          log(`getDisplayMedia failed: ${e.message}`);
          return;
        }

        const [track] = screenStream.getVideoTracks();
        currentScreenTrackId = Math.floor(Math.random() * 0xffffffff);

        // Local preview.
        const preview = document.createElement("video");
        preview.autoplay = true;
        preview.playsInline = true;
        preview.muted = true;
        preview.srcObject = screenStream;
        preview.style.cssText = "width:100%;border-radius:8px;background:#000";
        const box = document.createElement("div");
        box.className = "video-box";
        box.id = "local-screen";
        const label = document.createElement("div");
        label.className = "video-label";
        label.textContent = "Your Screen";
        box.appendChild(preview);
        box.appendChild(label);
        document.getElementById("screens").appendChild(box);

        if (pc) {
          screenSenders = [pc.addTrack(track, screenStream)];
          // Renegotiate with server.
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          sendWs({
            type: "offer",
            from: participantId,
            to: null,
            room_id: ROOM_ID,
            sdp: offer.sdp,
          });
          log("renegotiation offer sent (screen share)");
        }

        track.onended = () => stopScreenShare();
        document.getElementById("screenBtn").textContent = "Stop Sharing";
        log(`screen share started — track ${currentScreenTrackId}`);
      }

      async function stopScreenShare() {
        screenSenders.forEach((s) => { if (pc) pc.removeTrack(s); });
        screenSenders = [];
        if (screenStream) {
          screenStream.getTracks().forEach((t) => t.stop());
          screenStream = null;
        }
        document.getElementById("local-screen")?.remove();
        currentScreenTrackId = null;
        document.getElementById("screenBtn").textContent = "Share Screen";
        log("screen share stopped");
      }

      // ── Remote overlay ──

      function showRemoteOverlay(visible) {
        const el = document.getElementById("remoteOverlay");
        if (visible) { el.classList.remove("hidden"); }
        else { el.classList.add("hidden"); }
      }

      // ── Init ──

      async function init() {
        try {
          localStream = await navigator.mediaDevices.getUserMedia({
            audio: true,
            video: true,
          });
          document.getElementById("local").srcObject = localStream;
          const audioTracks = localStream.getAudioTracks().length;
          const videoTracks = localStream.getVideoTracks().length;
          log(`getUserMedia ok — ${audioTracks} audio, ${videoTracks} video tracks`);
        } catch (e) {
          log(`getUserMedia failed: ${e.message}`);
        }

        connectSignaling();
      }

      init();
    </script>
  </body>
</html>
