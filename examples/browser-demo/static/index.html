<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>seameet — demo</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #0f0f0f;
        color: #e0e0e0;
        padding: 1.5rem;
        max-width: 1200px;
        margin: 0 auto;
      }
      h1 {
        font-size: 1.4rem;
        margin-bottom: 0.5rem;
      }
      h1 span {
        font-weight: 400;
        color: #888;
        font-size: 0.9rem;
      }

      .badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 12px;
        font-size: 0.8rem;
        font-weight: 600;
        margin-left: 0.5rem;
      }
      .badge.connecting {
        background: #555;
        color: #ccc;
      }
      .badge.signaling {
        background: #b56e00;
        color: #fff;
      }
      .badge.connected {
        background: #1a7a1a;
        color: #fff;
      }
      .badge.disconnected {
        background: #a00;
        color: #fff;
      }

      .info {
        font-size: 0.85rem;
        color: #aaa;
        margin-bottom: 1rem;
      }

      .controls {
        margin-bottom: 1rem;
      }
      button {
        background: #2a2a2a;
        color: #e0e0e0;
        border: 1px solid #444;
        padding: 6px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.85rem;
      }
      button:hover {
        background: #3a3a3a;
      }
      button:active {
        background: #444;
      }

      .videos {
        display: flex;
        gap: 1rem;
        margin-bottom: 1rem;
        flex-wrap: wrap;
      }
      .video-box {
        flex: 1;
        min-width: 280px;
        max-width: 50%;
        background: #1a1a1a;
        border-radius: 8px;
        overflow: hidden;
        position: relative;
      }
      .video-box video {
        width: 100%;
        display: block;
        background: #000;
      }
      .video-label {
        position: absolute;
        bottom: 6px;
        left: 8px;
        font-size: 0.75rem;
        background: rgba(0, 0, 0, 0.6);
        padding: 2px 8px;
        border-radius: 4px;
      }

      #log {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 8px;
        padding: 0.75rem;
        font-family: "SF Mono", "Fira Code", monospace;
        font-size: 0.78rem;
        line-height: 1.5;
        height: 260px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-all;
        color: #aaa;
      }
    </style>
  </head>
  <body>
    <h1>
      seameet <span>— demo</span>
      <span id="badge" class="badge connecting">connecting</span>
    </h1>
    <div class="info">Participant: <code id="pid">—</code></div>

    <div class="controls">
      <button id="muteBtn" onclick="toggleMute()">Mute</button>
    </div>

    <div class="videos">
      <div class="video-box">
        <video id="local" autoplay playsinline muted></video>
        <div class="video-label">You</div>
      </div>
    </div>

    <!-- Remote peers' videos are added here dynamically -->
    <div id="remotes" class="videos"></div>

    <pre id="log"></pre>

    <script>
      "use strict";

      const WS_URL = `ws://${location.hostname || "localhost"}:3001`;
      const ROOM_ID = "demo-room";

      const participantId = crypto.randomUUID();
      document.getElementById("pid").textContent = participantId;

      let localStream = null;
      let pc = null;
      let ws = null;
      let muted = false;

      // Track remote peers: peerId -> { audioTransceiver, videoTransceiver, videoEl, boxEl }
      const remotePeers = new Map();
      // Whether we're currently renegotiating (to avoid overlapping offers).
      let renegotiating = false;
      // Whether a new renegotiation is needed after the current one completes.
      let renegotiationPending = false;
      // Timeout handle for renegotiation safety.
      let renegotiationTimer = null;

      // ── Logging ──

      function log(msg) {
        const ts = new Date().toISOString().split("T")[1].slice(0, 12);
        const el = document.getElementById("log");
        el.textContent += `[${ts}] ${msg}\n`;
        el.scrollTop = el.scrollHeight;
      }

      function setBadge(state) {
        const el = document.getElementById("badge");
        el.textContent = state;
        el.className = "badge " + state;
      }

      // ── Mute ──

      function toggleMute() {
        if (!localStream) return;
        muted = !muted;
        localStream.getAudioTracks().forEach((t) => { t.enabled = !muted; });
        document.getElementById("muteBtn").textContent = muted ? "Unmute" : "Mute";
        log(muted ? "microphone muted" : "microphone unmuted");
      }

      // ── WebSocket signaling ──

      function sendWs(obj) {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(obj));
        }
      }

      function connectSignaling() {
        ws = new WebSocket(WS_URL);

        ws.onopen = () => {
          log("WS connected");
          setBadge("signaling");
          sendWs({
            type: "join",
            participant: participantId,
            room_id: ROOM_ID,
          });
          log(`joined as ${participantId.slice(0, 8)}...`);
        };

        ws.onmessage = (evt) => {
          let data;
          try { data = JSON.parse(evt.data); } catch { return; }
          handleSignalingMessage(data);
        };

        ws.onclose = () => {
          log("WS disconnected");
          setBadge("disconnected");
        };

        ws.onerror = () => { log("WS error"); };
      }

      async function handleSignalingMessage(data) {
        if (data.type === "ready") {
          const peers = data.peers || [];
          log(`server ready — ${peers.length} existing peer(s)`);
          await createOfferToServer(peers);
          return;
        }

        if (data.type === "answer") {
          if (!pc) return;
          clearTimeout(renegotiationTimer);
          renegotiationTimer = null;
          try {
            await pc.setRemoteDescription({ type: "answer", sdp: data.sdp });
          } catch (e) {
            log(`setRemoteDescription FAILED: ${e.message}`);
            renegotiating = false;
            return;
          }
          log("server answer applied");
          renegotiating = false;

          // After renegotiation, re-play all remote video elements to ensure
          // the browser renders incoming media (some browsers pause after SDP change).
          for (const [, info] of remotePeers) {
            info.videoEl.play().catch(() => {});
          }

          // If another renegotiation was requested while we were waiting,
          // trigger it now.
          if (renegotiationPending) {
            renegotiationPending = false;
            await renegotiate();
          }
          return;
        }

        if (data.type === "ice_candidate") {
          if (!pc) return;
          try {
            await pc.addIceCandidate({
              candidate: data.candidate,
              sdpMid: data.sdp_mid || null,
              sdpMLineIndex: data.sdp_mline_index ?? null,
            });
          } catch (e) {
            log(`ICE candidate error: ${e.message}`);
          }
          return;
        }

        if (data.type === "peer_joined") {
          const peerId = data.participant;
          log(`peer joined: ${peerId.slice(0, 8)}...`);
          if (pc && !remotePeers.has(peerId)) {
            addRemotePeer(peerId);
            await renegotiate();
          }
          return;
        }

        if (data.type === "peer_left") {
          const peerId = data.participant;
          log(`peer left: ${peerId.slice(0, 8)}...`);
          removeRemotePeer(peerId);
          return;
        }
      }

      // ── Remote peer management ──

      function addRemotePeer(peerId) {
        if (remotePeers.has(peerId)) return;
        if (!pc) return;

        // Use sendrecv so the server's answer (sendrecv) matches the offer direction.
        // recvonly would require the server to answer sendonly, but str0m answers sendrecv.
        const audioTx = pc.addTransceiver("audio", { direction: "sendrecv" });
        const videoTx = pc.addTransceiver("video", { direction: "sendrecv" });

        // Create a video element for this peer.
        const box = document.createElement("div");
        box.className = "video-box";
        box.id = `remote-${peerId}`;

        const videoEl = document.createElement("video");
        videoEl.autoplay = true;
        videoEl.playsInline = true;
        videoEl.srcObject = new MediaStream();
        videoEl.style.cssText = "width:100%;display:block;background:#000";

        const label = document.createElement("div");
        label.className = "video-label";
        label.textContent = peerId.slice(0, 8) + "...";

        box.appendChild(videoEl);
        box.appendChild(label);
        document.getElementById("remotes").appendChild(box);

        remotePeers.set(peerId, {
          audioTransceiver: audioTx,
          videoTransceiver: videoTx,
          videoEl,
          boxEl: box,
        });

        log(`added transceivers for peer ${peerId.slice(0, 8)}...`);
      }

      function removeRemotePeer(peerId) {
        const info = remotePeers.get(peerId);
        if (!info) return;

        // Set transceivers to inactive instead of stopping them.
        // stop() creates port=0 m-sections that break renegotiation.
        try { info.audioTransceiver.direction = "inactive"; } catch {}
        try { info.videoTransceiver.direction = "inactive"; } catch {}

        // Remove the video element.
        info.videoEl.srcObject = null;
        info.boxEl.remove();
        remotePeers.delete(peerId);
        log(`removed peer ${peerId.slice(0, 8)}...`);
      }

      async function renegotiate() {
        if (!pc) return;
        if (renegotiating) {
          renegotiationPending = true;
          log("renegotiation queued (already in progress)");
          return;
        }
        renegotiating = true;

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        // Safety timeout: if server never answers, reset state so future
        // renegotiations aren't permanently blocked.
        renegotiationTimer = setTimeout(() => {
          if (renegotiating) {
            log("renegotiation timeout (10s) — resetting");
            renegotiating = false;
            if (renegotiationPending) {
              renegotiationPending = false;
              renegotiate();
            }
          }
        }, 10000);

        sendWs({
          type: "offer",
          from: participantId,
          to: null,
          room_id: ROOM_ID,
          sdp: offer.sdp,
        });
        log("renegotiation offer sent");
      }

      // ── WebRTC (browser <-> server) ──

      async function createOfferToServer(existingPeers) {
        pc = new RTCPeerConnection({ iceServers: [] });

        pc.onicecandidate = (evt) => {
          if (!evt.candidate) return;
          sendWs({
            type: "ice_candidate",
            from: participantId,
            to: participantId,
            room_id: ROOM_ID,
            candidate: evt.candidate.candidate,
            sdp_mid: evt.candidate.sdpMid,
            sdp_mline_index: evt.candidate.sdpMLineIndex,
          });
        };

        pc.ontrack = (evt) => {
          log(`remote track received: ${evt.track.kind} (mid=${evt.transceiver.mid})`);
          // Find which peer this transceiver belongs to.
          for (const [peerId, info] of remotePeers) {
            if (evt.transceiver === info.audioTransceiver ||
                evt.transceiver === info.videoTransceiver) {
              const ms = info.videoEl.srcObject;
              // Remove existing tracks of same kind to prevent duplicates
              for (const old of ms.getTracks()) {
                if (old.kind === evt.track.kind && old.id !== evt.track.id) {
                  ms.removeTrack(old);
                }
              }
              ms.addTrack(evt.track);
              info.videoEl.play().catch(() => {});
              log(`routed ${evt.track.kind} track to peer ${peerId.slice(0, 8)}...`);
              return;
            }
          }
          log(`unmatched track (mid=${evt.transceiver.mid})`);
        };

        let disconnectTimer = null;
        pc.onconnectionstatechange = () => {
          log(`connection state: ${pc.connectionState}`);
          clearTimeout(disconnectTimer);
          if (pc.connectionState === "connected") {
            setBadge("connected");
          } else if (pc.connectionState === "failed") {
            setBadge("disconnected");
          } else if (pc.connectionState === "disconnected") {
            // "disconnected" is often transient during renegotiation.
            // Only show it if it persists for 3 seconds.
            disconnectTimer = setTimeout(() => {
              if (pc.connectionState === "disconnected") {
                setBadge("disconnected");
              }
            }, 3000);
          }
        };

        // Add local tracks (own camera/mic).
        if (localStream) {
          localStream.getTracks().forEach((track) => {
            pc.addTrack(track, localStream);
          });
        } else {
          pc.addTransceiver("audio", { direction: "sendrecv" });
          pc.addTransceiver("video", { direction: "sendrecv" });
          log("no local media — receiving only");
        }

        // Add recvonly transceivers for each existing peer BEFORE the first offer.
        for (const peerId of existingPeers) {
          addRemotePeer(peerId);
        }

        // Create and send offer.
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        sendWs({
          type: "offer",
          from: participantId,
          to: null,
          room_id: ROOM_ID,
          sdp: offer.sdp,
        });
        log("offer sent to server");
      }

      // ── Init ──

      async function init() {
        try {
          localStream = await navigator.mediaDevices.getUserMedia({
            audio: true,
            video: true,
          });
          document.getElementById("local").srcObject = localStream;
          const audioTracks = localStream.getAudioTracks().length;
          const videoTracks = localStream.getVideoTracks().length;
          log(`getUserMedia ok — ${audioTracks} audio, ${videoTracks} video tracks`);
        } catch (e) {
          log(`getUserMedia failed: ${e.message}`);
        }

        connectSignaling();
      }

      init();
    </script>
  </body>
</html>
